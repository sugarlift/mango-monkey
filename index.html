<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#ffd93d" />
<title>Mango Monkey 🥭🐒</title>
<style>
  :root {
    --mango-orange: #ff9a3c;
    --mango-deep: #ff6b00;
    --mango-flesh: #ffd166;
    --mango-pit: #8b4a1f;
    --leaf: #2e8b3d;
    --banana-yellow: #ffe066;
    --banana-shadow: #e8c547;
    --banana-stem: #6b4226;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Comic Sans MS", "Chalkboard SE", system-ui, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background-color: var(--banana-yellow);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'>\
<rect width='160' height='160' fill='%23ffe066'/>\
<g transform='translate(30 40) rotate(-28)'>\
<path d='M0 30 Q 10 -5 60 0 Q 72 2 70 8 Q 66 6 58 8 Q 20 15 10 40 Q 6 48 2 45 Z' fill='%23ffd23f' stroke='%236b4226' stroke-width='2.2' stroke-linejoin='round'/>\
<path d='M60 0 Q 66 -4 72 -2 L 70 4 Q 66 4 62 6 Z' fill='%236b4226'/>\
</g>\
<g transform='translate(95 110) rotate(20)'>\
<path d='M0 30 Q 10 -5 60 0 Q 72 2 70 8 Q 66 6 58 8 Q 20 15 10 40 Q 6 48 2 45 Z' fill='%23ffd23f' stroke='%236b4226' stroke-width='2.2' stroke-linejoin='round'/>\
<path d='M60 0 Q 66 -4 72 -2 L 70 4 Q 66 4 62 6 Z' fill='%236b4226'/>\
</g>\
</svg>");
    background-size: 180px 180px;
    color: #3a2410;
  }

  .app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px) 16px;
  }

  header {
    width: 100%;
    text-align: center;
    pointer-events: none;
    margin-top: 8px;
  }

  h1 {
    margin: 0;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: -1px;
    color: #3a2410;
    text-shadow: 0 3px 0 #fff8, 0 6px 14px #0002;
  }

  h1 .emoji { display: inline-block; transform: translateY(4px); }

  .tagline {
    margin: 4px 0 0;
    font-size: clamp(14px, 3.2vw, 18px);
    font-weight: 600;
    color: #5a3a1a;
    opacity: 0.85;
  }

  .stage {
    position: relative;
    flex: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .mango-wrap {
    position: relative;
    width: min(70vw, 380px);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 18px 24px rgba(0,0,0,0.18));
    transition: transform 0.3s ease;
  }

  .mango-wrap.wiggle {
    animation: wiggle 2.8s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50%      { transform: rotate(2deg) translateY(-6px); }
  }

  .mango-svg { width: 100%; height: 100%; overflow: visible; }

  .half {
    transform-origin: center;
    transition: transform 0.9s cubic-bezier(.2,.9,.3,1.1), opacity 0.9s ease;
  }

  .mango-wrap.sliced .half-left  { transform: translate(-22%, 4%) rotate(-14deg); }
  .mango-wrap.sliced .half-right { transform: translate( 22%, 4%) rotate( 14deg); }
  .mango-wrap.sliced .skin-whole { opacity: 0; }
  .mango-wrap.sliced .flesh-group { opacity: 1; }
  .mango-wrap.sliced .pit { opacity: 1; transform: scale(1); }
  .mango-wrap.sliced .sparkle { animation: sparkle 1.1s ease-out forwards; }

  .flesh-group { opacity: 0; transition: opacity 0.5s ease 0.2s; }
  .pit { opacity: 0; transform: scale(0.6); transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s; transform-origin: center; }

  .sparkle { opacity: 0; transform-origin: center; }
  @keyframes sparkle {
    0%   { opacity: 0; transform: scale(0.3) rotate(0deg); }
    60%  { opacity: 1; transform: scale(1.2) rotate(20deg); }
    100% { opacity: 0; transform: scale(1.6) rotate(40deg); }
  }

  .fortune-card {
    position: absolute;
    left: 50%;
    bottom: -10%;
    transform: translate(-50%, 40px) scale(0.6);
    opacity: 0;
    pointer-events: none;
    background: #fffbe6;
    border: 3px dashed #a0522d;
    border-radius: 18px;
    padding: 18px 22px;
    max-width: 82%;
    text-align: center;
    font-size: clamp(18px, 4.4vw, 26px);
    font-weight: 800;
    color: #3a2410;
    line-height: 1.25;
    box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    transition: transform 0.55s cubic-bezier(.2,1.3,.4,1), opacity 0.4s ease;
  }

  .fortune-card.show {
    transform: translate(-50%, 0) scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  .fortune-card .label {
    display: block;
    font-size: 0.6em;
    letter-spacing: 2px;
    color: var(--mango-deep);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    width: 100%;
    padding-bottom: 8px;
  }

  button {
    font-family: inherit;
    font-weight: 800;
    font-size: clamp(16px, 3.6vw, 20px);
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    background: var(--mango-deep);
    color: #fff;
    box-shadow: 0 6px 0 #b34800, 0 10px 16px rgba(0,0,0,0.18);
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.2s;
    letter-spacing: 0.5px;
  }

  button:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #b34800, 0 6px 10px rgba(0,0,0,0.18);
  }

  button.secondary {
    background: #fff;
    color: var(--mango-deep);
    box-shadow: 0 6px 0 #d28f4e, 0 10px 16px rgba(0,0,0,0.12);
  }

  button.secondary:active {
    box-shadow: 0 3px 0 #d28f4e, 0 6px 10px rgba(0,0,0,0.12);
  }

  .hint {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 700;
    color: #5a3a1a;
    font-size: clamp(14px, 3.2vw, 16px);
    background: #fffbe6cc;
    padding: 4px 12px;
    border-radius: 999px;
    white-space: nowrap;
    animation: bob 1.6s ease-in-out infinite;
  }

  .mango-wrap.sliced ~ .hint, .hide { display: none !important; }

  @keyframes bob {
    0%,100% { transform: translate(-50%, 0); }
    50%     { transform: translate(-50%, -6px); }
  }

  footer {
    font-size: 12px;
    color: #5a3a1a99;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="emoji">🐒</span> Mango Monkey <span class="emoji">🥭</span></h1>
    <p class="tagline">Slice the mango to reveal your fortune!</p>
  </header>

  <div class="stage" id="stage">
    <canvas id="trail"></canvas>

    <div class="mango-wrap wiggle" id="mangoWrap">
      <div class="hint" id="hint">✨ swipe across the mango ✨</div>
      <svg class="mango-svg" viewBox="0 0 400 400" aria-hidden="true">
        <!-- LEFT HALF -->
        <g class="half half-left">
          <!-- flesh (revealed when sliced) -->
          <g class="flesh-group">
            <path d="M200,60
                     C 120,60 70,140 70,220
                     C 70,300 120,360 200,360
                     L 200,60 Z"
                  fill="#ffd166" stroke="#e68a00" stroke-width="3"/>
            <path d="M200,80
                     C 140,80 95,150 95,220
                     C 95,290 140,345 200,345
                     L 200,80 Z"
                  fill="#ffdd99" opacity="0.8"/>
          </g>
          <!-- skin (whole mango look, left side) -->
          <path class="skin-whole" d="M200,40
                   C 110,40 50,130 50,220
                   C 50,320 110,380 200,380
                   L 200,40 Z"
                fill="url(#skinGradL)" stroke="#b34800" stroke-width="4"/>
        </g>

        <!-- RIGHT HALF -->
        <g class="half half-right">
          <g class="flesh-group">
            <path d="M200,60
                     C 280,60 330,140 330,220
                     C 330,300 280,360 200,360
                     L 200,60 Z"
                  fill="#ffd166" stroke="#e68a00" stroke-width="3"/>
            <path d="M200,80
                     C 260,80 305,150 305,220
                     C 305,290 260,345 200,345
                     L 200,80 Z"
                  fill="#ffdd99" opacity="0.8"/>
          </g>
          <path class="skin-whole" d="M200,40
                   C 290,40 350,130 350,220
                   C 350,320 290,380 200,380
                   L 200,40 Z"
                fill="url(#skinGradR)" stroke="#b34800" stroke-width="4"/>
        </g>

        <!-- leaf/stem on whole mango -->
        <g class="skin-whole">
          <path d="M200,50 Q 205,20 230,18 Q 215,35 210,52 Z"
                fill="#2e8b3d" stroke="#1e5c29" stroke-width="2"/>
          <rect x="197" y="32" width="6" height="18" rx="2" fill="#6b4226"/>
        </g>

        <!-- pit -->
        <ellipse class="pit" cx="200" cy="220" rx="34" ry="70"
                 fill="#8b4a1f" stroke="#5a2e0f" stroke-width="3"/>
        <ellipse class="pit" cx="200" cy="220" rx="22" ry="56"
                 fill="#a6632d" opacity="0.7"/>

        <!-- sparkles -->
        <g class="sparkle" transform="translate(110 120)">
          <path d="M0,-14 L4,-4 L14,0 L4,4 L0,14 L-4,4 L-14,0 L-4,-4 Z" fill="#fffbe6" stroke="#ffb84d" stroke-width="2"/>
        </g>
        <g class="sparkle" transform="translate(300 140)">
          <path d="M0,-10 L3,-3 L10,0 L3,3 L0,10 L-3,3 L-10,0 L-3,-3 Z" fill="#fffbe6" stroke="#ffb84d" stroke-width="2"/>
        </g>
        <g class="sparkle" transform="translate(290 290)">
          <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#fffbe6" stroke="#ffb84d" stroke-width="2"/>
        </g>

        <defs>
          <linearGradient id="skinGradL" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#ffb347"/>
            <stop offset="60%" stop-color="#ff8c1a"/>
            <stop offset="100%" stop-color="#e85d00"/>
          </linearGradient>
          <linearGradient id="skinGradR" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#ffcc5c"/>
            <stop offset="50%" stop-color="#ff9a3c"/>
            <stop offset="100%" stop-color="#d65200"/>
          </linearGradient>
        </defs>
      </svg>

      <div class="fortune-card" id="fortune">
        <span class="label">🥭 Your Fortune 🐒</span>
        <div id="fortuneText">You will have a very silly day.</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="againBtn" class="secondary">🔄 New Mango</button>
  </div>

  <footer>Made with 🐒 for the Harvey kids</footer>
</div>

<!-- Juice splash overlay -->
<audio id="sliceSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YRAAAAAA/wD/AP8A/wD/AP8A/wD/" type="audio/wav"/>
</audio>

<script>
(() => {
  const FORTUNES = [
    "You will laugh so hard milk comes out your nose. 🥛",
    "A tiny adventure is waiting just outside your door. 🌳",
    "Someone you love is thinking about you right now. 💛",
    "Today is a perfect day to be brave. 🦁",
    "A surprise snack is coming your way. 🍪",
    "You'll be the funniest person in the room today. 🤣",
    "Be kind to a friend - it will come back to you double. ✨",
    "Something you lost will be found. 🔎",
    "You're stronger than you think. 💪",
    "A new idea is tickling your brain. Chase it! 💡",
    "You'll dream of flying tonight. 🪁",
    "Your smile is someone's favorite thing today. 😄",
    "A wild monkey approves of your outfit. 🐒👕",
    "You will build something amazing this week. 🛠️",
    "A big hug is in your future. 🤗",
    "You'll learn a brand new word today. 📚",
    "Dance for 10 seconds and watch something cool happen. 💃",
    "You have superhero energy today. Use it for good! 🦸",
    "A tiny kindness will grow into something huge. 🌱",
    "You'll spot a rainbow when you least expect it. 🌈",
    "Your next drawing will be your best one yet. 🎨",
    "Be curious - a question will lead you somewhere fun. ❓",
    "An old favorite song will find you today. 🎶",
    "You are exactly where you're supposed to be. ⭐",
    "The bananas approve of your choices. 🍌👍",
    "A secret handshake is waiting to be invented. 🤝",
    "You will eat something delicious soon. 🍓",
    "A silly joke is heading your way. Get ready! 🤪",
    "Be patient - something good is cooking. 🍳",
    "You have excellent monkey vibes today. 🐵",
  ];

  const mangoWrap = document.getElementById('mangoWrap');
  const fortuneCard = document.getElementById('fortune');
  const fortuneText = document.getElementById('fortuneText');
  const againBtn = document.getElementById('againBtn');
  const hint = document.getElementById('hint');
  const canvas = document.getElementById('trail');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');

  let sliced = false;
  let points = [];
  let startPoint = null;
  let dragging = false;

  function resizeCanvas() {
    const rect = stage.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

  function stageCoords(ev) {
    const rect = stage.getBoundingClientRect();
    const t = (ev.touches && ev.touches[0]) || ev;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function clearTrail() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function drawTrail() {
    clearTrail();
    if (points.length < 2) return;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    // outer glow
    ctx.strokeStyle = 'rgba(255, 210, 100, 0.55)';
    ctx.lineWidth = 22;
    strokePath();
    // inner bright
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.lineWidth = 8;
    strokePath();
  }

  function strokePath() {
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();
  }

  function fadeTrail() {
    // soft fade out
    let alpha = 1;
    const fadeId = setInterval(() => {
      alpha -= 0.08;
      if (alpha <= 0) {
        clearTrail();
        clearInterval(fadeId);
        return;
      }
      ctx.save();
      ctx.globalAlpha = alpha;
      drawTrail();
      ctx.restore();
    }, 30);
  }

  function onStart(ev) {
    if (sliced) return;
    dragging = true;
    points = [];
    const p = stageCoords(ev);
    startPoint = p;
    points.push(p);
    ev.preventDefault();
  }

  function onMove(ev) {
    if (!dragging || sliced) return;
    const p = stageCoords(ev);
    points.push(p);
    if (points.length > 60) points.shift();
    drawTrail();

    // check distance across mango center
    const mangoRect = mangoWrap.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const cx = mangoRect.left + mangoRect.width / 2 - stageRect.left;
    const cy = mangoRect.top + mangoRect.height / 2 - stageRect.top;
    const r = mangoRect.width / 2;

    // did the path cross the mango?
    let crossedLeft = false, crossedRight = false;
    for (const pt of points) {
      const dx = pt.x - cx, dy = pt.y - cy;
      if (dx * dx + dy * dy < r * r) {
        if (dx < -r * 0.25) crossedLeft = true;
        if (dx >  r * 0.25) crossedRight = true;
      }
    }
    const dxTotal = Math.abs((points[points.length - 1].x) - (startPoint.x));
    if (crossedLeft && crossedRight && dxTotal > r * 0.6) {
      slice();
    }
    ev.preventDefault();
  }

  function onEnd(ev) {
    dragging = false;
    if (!sliced) {
      fadeTrail();
      points = [];
    }
    if (ev && ev.cancelable) ev.preventDefault();
  }

  function slice() {
    if (sliced) return;
    sliced = true;
    mangoWrap.classList.remove('wiggle');
    mangoWrap.classList.add('sliced');
    hint.classList.add('hide');
    burstJuice();
    haptic();
    setTimeout(() => {
      const pick = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
      fortuneText.textContent = pick;
      fortuneCard.classList.add('show');
    }, 650);
    setTimeout(() => { clearTrail(); points = []; }, 400);
  }

  function haptic() {
    if (navigator.vibrate) {
      try { navigator.vibrate([20, 40, 30]); } catch(_) {}
    }
  }

  // juice droplets
  function burstJuice() {
    const rect = mangoWrap.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const cx = rect.left + rect.width / 2 - stageRect.left;
    const cy = rect.top + rect.height / 2 - stageRect.top;
    const drops = [];
    for (let i = 0; i < 26; i++) {
      const ang = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      drops.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed - 2,
        r: 4 + Math.random() * 7,
        life: 1,
        hue: 30 + Math.random() * 20,
      });
    }
    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const d of drops) {
        d.vy += 0.25;
        d.x += d.vx;
        d.y += d.vy;
        d.life -= 0.015;
        if (d.life > 0) {
          alive = true;
          ctx.globalAlpha = Math.max(0, d.life);
          ctx.fillStyle = `hsl(${d.hue}, 95%, 60%)`;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      if (alive) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    tick();
  }

  function reset() {
    sliced = false;
    points = [];
    clearTrail();
    mangoWrap.classList.remove('sliced');
    mangoWrap.classList.add('wiggle');
    fortuneCard.classList.remove('show');
    hint.classList.remove('hide');
  }

  againBtn.addEventListener('click', reset);

  // ?demo=1 auto-slices for screenshot/demo purposes
  if (location.search.indexOf('demo=1') !== -1) {
    setTimeout(slice, 400);
  }

  // Pointer + touch handling on the whole stage so swipes count
  stage.addEventListener('touchstart', onStart, { passive: false });
  stage.addEventListener('touchmove',  onMove,  { passive: false });
  stage.addEventListener('touchend',   onEnd,   { passive: false });
  stage.addEventListener('touchcancel',onEnd,   { passive: false });

  stage.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onEnd);

  // Prevent iOS double-tap zoom / pull-to-refresh while playing
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick',     e => e.preventDefault());
})();
</script>
</body>
</html>
